<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue véhicules – MBPRESTIGE</title>
<link rel="stylesheet" href="css/app.css">
<style>
.catalogue-layout { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; align-items: start; }
.sidebar { position: sticky; top: 80px; background: #fff; border-radius: var(--radius); border: 1.5px solid var(--gray-200); overflow: hidden; }
.sidebar-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
.sidebar-header span { font-weight: 700; font-size: .875rem; color: var(--gray-900); }
.sidebar-reset { font-size: .8rem; color: var(--blue); cursor: pointer; }
.filter-group { border-bottom: 1px solid var(--gray-100); }
.filter-group-header { padding: .875rem 1.25rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; font-size: .875rem; font-weight: 600; color: var(--gray-800); }
.filter-group-header:hover { background: var(--gray-50); }
.filter-group-header .arrow { transition: transform .2s; color: var(--gray-400); }
.filter-group-header.open .arrow { transform: rotate(180deg); }
.filter-group-body { padding: .75rem 1.25rem 1rem; display: none; }
.filter-group-body.open { display: block; }
.filter-options { display: flex; flex-direction: column; gap: .5rem; }
.filter-option { display: flex; align-items: center; gap: .625rem; cursor: pointer; padding: .25rem 0; }
.filter-option input[type="checkbox"], .filter-option input[type="radio"] { width: 15px; height: 15px; accent-color: var(--blue); flex-shrink: 0; }
.filter-option span { font-size: .875rem; color: var(--gray-700); }
.filter-option .count { margin-left: auto; font-size: .75rem; color: var(--gray-400); }
.range-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
.sidebar-apply { padding: 1rem 1.25rem; }

/* Toolbar */
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: .75rem; }
.toolbar-left { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
.active-filters { display: flex; gap: .5rem; flex-wrap: wrap; }
.active-filter { display: flex; align-items: center; gap: .375rem; background: var(--blue-lt); color: var(--blue); font-size: .75rem; font-weight: 600; padding: .25rem .625rem; border-radius: 9999px; cursor: pointer; }
.active-filter:hover { background: #bfdbfe; }
.results-count { font-size: .875rem; color: var(--gray-500); white-space: nowrap; }
.sort-select { border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: .4rem .75rem; font-size: .875rem; color: var(--gray-700); background: #fff; cursor: pointer; }

/* View toggle */
.view-toggle { display: flex; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); overflow: hidden; }
.view-btn { padding: .4rem .625rem; background: #fff; border: none; cursor: pointer; color: var(--gray-400); transition: all .15s; }
.view-btn.active { background: var(--blue); color: #fff; }

/* List view */
.listings-list .listing-card { display: flex; flex-direction: row; }
.listings-list .listing-card-img { width: 220px; flex-shrink: 0; aspect-ratio: auto; height: 160px; }
.listings-list .listing-card-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

/* Mobile filter btn */
.mobile-filter-btn { display: none; }
.filter-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; }
.filter-overlay.open { display: block; }
.filter-drawer { position: fixed; left: 0; top: 0; bottom: 0; width: min(320px, 90vw); background: #fff; z-index: 301; overflow-y: auto; transform: translateX(-100%); transition: transform .3s ease; }
.filter-drawer.open { transform: translateX(0); }
.filter-drawer-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
.close-btn { background: none; border: none; cursor: pointer; font-size: 1.25rem; color: var(--gray-500); }

/* Pagination */
.pagination { display: flex; gap: .5rem; justify-content: center; margin-top: 2rem; }
.page-btn { padding: .5rem .875rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); background: #fff; cursor: pointer; font-size: .875rem; color: var(--gray-700); transition: all .15s; }
.page-btn:hover { border-color: var(--blue); color: var(--blue); }
.page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }
.listing-price.locked { font-size: .92rem; color: var(--blue); }
.listing-price-sub.locked { color: var(--blue); font-weight: 600; }

@media (max-width: 1024px) {
  .catalogue-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .mobile-filter-btn { display: flex; }
}
</style>
</head>
<body>

<!-- HEADER (identique) -->
<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>
        MBPRESTIGE
      </a>
      <nav class="nav">
        <a href="catalogue.html" class="active">Tous les véhicules</a>
        <a href="catalogue.html?type=auction_open">Enchères</a>
        <a href="catalogue.html?type=fixed_price">Prix fixes</a>
        <a href="catalogue.html?type=partner_stock">Stock</a>
        <a href="how-it-works.html">Comment ça marche</a>
      </nav>
      <div class="header-actions">
        <a href="login.html" class="btn btn-sm" style="color:var(--gray-700)">Connexion</a>
        <a href="register.html" class="btn btn-primary btn-sm">S'inscrire</a>
      </div>
    </div>
  </div>
</header>

<main style="padding:2rem 0">
  <div class="container">

    <!-- Page header -->
    <div style="margin-bottom:1.5rem">
      <h1 style="font-size:1.75rem">Catalogue véhicules</h1>
      <p class="text-muted text-sm" id="pageSubtitle" style="margin-top:.25rem">Chargement…</p>
    </div>

    <div class="catalogue-layout">

      <!-- SIDEBAR FILTRES -->
      <aside class="sidebar" id="sidebarDesktop"></aside>

      <!-- DRAWER MOBILE -->
      <div class="filter-overlay" id="filterOverlay" onclick="closeFilters()"></div>
      <div class="filter-drawer" id="filterDrawer">
        <div class="filter-drawer-header">
          <span>Filtres</span>
          <button class="close-btn" onclick="closeFilters()">✕</button>
        </div>
        <div id="sidebarMobile"></div>
      </div>

      <!-- RÉSULTATS -->
      <div>
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="btn btn-outline btn-sm mobile-filter-btn" onclick="openFilters()">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 4h18M7 8h10M10 12h4"/></svg>
              Filtres
            </button>
            <div class="active-filters" id="activeFilters"></div>
            <span class="results-count" id="resultsCount"></span>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <select class="sort-select" id="sortSelect" onchange="applySort()">
              <option value="recent">Plus récents</option>
              <option value="price_asc">Prix croissant</option>
              <option value="price_desc">Prix décroissant</option>
              <option value="ends_at">Fin enchère</option>
              <option value="km_asc">Kilométrage</option>
            </select>
            <div class="view-toggle">
              <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grille">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M3 3h7v7H3zm0 11h7v7H3zm11-11h7v7h-7zm0 11h7v7h-7z"/></svg>
              </button>
              <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="Liste">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Grille annonces -->
        <div class="grid-3" id="listingsGrid" style="gap:1.25rem"></div>

        <!-- Empty state -->
        <div id="emptyState" style="display:none;text-align:center;padding:4rem 0">
          <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
          <h3 style="margin-bottom:.5rem">Aucun véhicule trouvé</h3>
          <p class="text-muted text-sm">Essayez de modifier vos filtres.</p>
          <button class="btn btn-outline" style="margin-top:1rem" onclick="resetFilters()">Réinitialiser</button>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- FOOTER abrégé -->
<footer class="footer" style="margin-top:3rem">
  <div class="container">
    <div class="footer-bottom" style="border:none;padding:1.5rem 0 0">
      <a href="index.html" class="logo" style="color:#fff">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>
        MBPRESTIGE
      </a>
      <span>&copy; 2025 MBPRESTIGE</span>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script>
// ─── État ──────────────────────────────────────────────────────────
let filters = {};
let currentView = 'grid';
let currentPage = 1;
const PER_PAGE = 12;

function hasAccountAccess() {
  return localStorage.getItem('mbp_has_account') === '1' || localStorage.getItem('mbp_logged_in') === '1';
}

const canViewAuctionPrices = hasAccountAccess();

// ─── Init ──────────────────────────────────────────────────────────
function init() {
  // Lire URL params
  const params = new URLSearchParams(window.location.search);
  params.forEach((v, k) => { if (v) filters[k] = v; });

  renderSidebar();
  renderActiveFilters();
  renderListings();
}

// ─── Données filtrées + triées ─────────────────────────────────────
function getFiltered() {
  let data = [...(window.ALL_LISTINGS || DEMO_ALL)];

  if (filters.make)         data = data.filter(l => l.make === filters.make);
  if (filters.model)        data = data.filter(l => l.model === filters.model);
  if (filters.fuel)         data = data.filter(l => l.fuel === filters.fuel);
  if (filters.gearbox)      data = data.filter(l => l.gearbox === filters.gearbox);
  if (filters.country)      data = data.filter(l => l.country === filters.country);
  if (filters.type)         data = data.filter(l => l.type === filters.type);
  if (filters.vat)          data = data.filter(l => l.vat);
  if (filters.year_min)     data = data.filter(l => l.year >= +filters.year_min);
  if (filters.year_max)     data = data.filter(l => l.year <= +filters.year_max);
  if (filters.km_max)       data = data.filter(l => l.km <= +filters.km_max);
  if (filters.price_min)    data = data.filter(l => l.price >= +filters.price_min);
  if (filters.price_max)    data = data.filter(l => l.price <= +filters.price_max);
  if (filters.q) {
    const q = filters.q.toLowerCase();
    data = data.filter(l => l.title.toLowerCase().includes(q) || l.make.toLowerCase().includes(q));
  }

  const sort = document.getElementById('sortSelect')?.value || 'recent';
  if (sort === 'price_asc')  data.sort((a,b) => a.price - b.price);
  if (sort === 'price_desc') data.sort((a,b) => b.price - a.price);
  if (sort === 'km_asc')     data.sort((a,b) => a.km - b.km);
  if (sort === 'ends_at')    data.sort((a,b) => (a.ends_in||999999) - (b.ends_in||999999));

  return data;
}

// ─── Render ────────────────────────────────────────────────────────
function renderListings() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const pages    = Math.ceil(total / PER_PAGE);
  const start    = (currentPage - 1) * PER_PAGE;
  const paged    = filtered.slice(start, start + PER_PAGE);

  document.getElementById('pageSubtitle').textContent = `${total} véhicule${total > 1 ? 's' : ''} disponible${total > 1 ? 's' : ''}`;
  document.getElementById('resultsCount').textContent = `${total} résultat${total > 1 ? 's' : ''}`;

  const grid = document.getElementById('listingsGrid');
  const empty = document.getElementById('emptyState');

  if (!paged.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = paged.map(l => createCard(l)).join('');
    if (currentView === 'list') {
      grid.classList.remove('grid-3');
      grid.classList.add('listings-list');
      grid.style.display = 'flex';
      grid.style.flexDirection = 'column';
    } else {
      grid.classList.add('grid-3');
      grid.classList.remove('listings-list');
      grid.style.display = '';
    }
  }

  renderPagination(pages);
  startCardTimers();
}

const TYPE_B = {
  auction_open:  { l:'Enchère ouverte', c:'badge-red' },
  auction_blind: { l:'Enchère blind',   c:'badge-purple' },
  fixed_price:   { l:'Prix fixe',       c:'badge-green' },
  partner_stock: { l:'Stock',           c:'badge-blue' },
};
function createCard(l) {
  const b = TYPE_B[l.type] || {};
  const isA = ['auction_open','auction_blind'].includes(l.type);
  const showAuctionPrice = !isA || canViewAuctionPrices;
  const priceHtml = showAuctionPrice
    ? `<div class="listing-price">${l.price.toLocaleString('fr-FR')} EUR</div>${isA ? `<div class="listing-price-sub">${l.bids} offre${l.bids>1?'s':''}</div>` : ''}`
    : '<div class="listing-price locked">Prix masque</div><div class="listing-price-sub locked">Creez un compte pour voir les montants d'enchere.</div>' ;
  return `
  <a href="vehicle.html?id=${l.id}" class="card listing-card">
    <div class="listing-card-img">
      <img src="${l.img}" alt="${l.title}" loading="lazy">
      <div class="listing-card-badges">
        <span class="badge ${b.c}">${b.l}</span>
        ${l.vat ? '<span class="badge badge-yellow">TVA</span>' : ''}
      </div>
      <span class="listing-card-country">${l.country}</span>
      ${isA && l.ends_in ? `<div class="listing-card-timer"><span class="timer-dot"></span><span data-timer="${l.id}">${fmt(l.ends_in)}</span></div>` : ''}
    </div>
    <div class="listing-card-body">
      <div class="listing-card-title">${l.title}</div>
      <div class="listing-card-specs">
        <span>${l.year}</span><span>${l.km.toLocaleString('fr-FR')} km</span>
        <span>${l.fuel}</span><span>${l.gearbox}</span>
      </div>
      <div class="listing-card-footer">
        <div>
          ${priceHtml}
        </div>
        <button class="fav-btn" onclick="event.preventDefault();toggleFav(this)">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </button>
      </div>
    </div>
  </a>`;
}

function fmt(s) {
  if(!s||s<=0) return 'Terminé';
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),ss=s%60;
  const p=n=>String(n).padStart(2,'0');
  if(d>0) return `${d}j ${p(h)}h`;
  if(h>0) return `${p(h)}h ${p(m)}m`;
  if(m>0) return `${p(m)}m ${p(ss)}s`;
  return `${ss}s`;
}

const timerState = {};
function startCardTimers() {
  document.querySelectorAll('[data-timer]').forEach(el => {
    const id = +el.dataset.timer;
    const l = (window.ALL_LISTINGS || DEMO_ALL).find(x => x.id === id);
    if (l) timerState[id] = l.ends_in || 0;
  });
  clearInterval(window._timerInterval);
  window._timerInterval = setInterval(() => {
    document.querySelectorAll('[data-timer]').forEach(el => {
      const id = +el.dataset.timer;
      if (timerState[id] > 0) timerState[id]--;
      el.textContent = fmt(timerState[id]);
    });
  }, 1000);
}

// ─── Pagination ────────────────────────────────────────────────────
function renderPagination(pages) {
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 2) {
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 3) {
      html += `<span style="padding:.5rem .25rem;color:var(--gray-400)">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}
function goPage(p) { currentPage = p; renderListings(); window.scrollTo({top:0,behavior:'smooth'}); }

// ─── Filtres ───────────────────────────────────────────────────────
function renderSidebar() {
  const data = window.ALL_LISTINGS || DEMO_ALL;
  const makes    = [...new Set(data.map(l=>l.make))].sort();
  const fuels    = [...new Set(data.map(l=>l.fuel))].filter(Boolean).sort();
  const gearboxes= [...new Set(data.map(l=>l.gearbox))].filter(Boolean).sort();
  const countries= [...new Set(data.map(l=>l.country))].filter(Boolean).sort();

  const html = buildSidebarHTML({ makes, fuels, gearboxes, countries });
  document.getElementById('sidebarDesktop').innerHTML = html;
  document.getElementById('sidebarMobile').innerHTML = html;

  // Ouvrir les groupes actifs
  document.querySelectorAll('.filter-group-header').forEach(h => {
    h.addEventListener('click', () => {
      h.classList.toggle('open');
      h.nextElementSibling.classList.toggle('open');
    });
    // Auto-ouvrir si filtre actif
    const body = h.nextElementSibling;
    const key = h.dataset.key;
    if (filters[key]) { h.classList.add('open'); body.classList.add('open'); }
  });
}

function buildSidebarHTML({ makes, fuels, gearboxes, countries }) {
  return `
  <div class="sidebar-header">
    <span>Filtres</span>
    <span class="sidebar-reset" onclick="resetFilters()">Tout effacer</span>
  </div>
  <form id="filterForm" onsubmit="event.preventDefault()">
    ${filterGroup('type','Type d\'annonce', [
      {v:'auction_open',l:'Enchère ouverte'},{v:'auction_blind',l:'Enchère blind'},
      {v:'fixed_price',l:'Prix fixe'},{v:'partner_stock',l:'Stock partenaire'}
    ], 'radio', 'type')}
    ${filterGroup('make','Marque', makes.map(m=>({v:m,l:m})), 'radio', 'make')}
    ${filterGroup('fuel','Carburant', fuels.map(f=>({v:f,l:f})), 'radio', 'fuel')}
    ${filterGroup('gearbox','Boîte de vitesses', gearboxes.map(g=>({v:g,l:g})), 'radio', 'gearbox')}
    ${filterGroup('country','Pays d\'origine', countries.map(c=>({v:c,l:c})), 'radio', 'country')}
    <div class="filter-group">
      <div class="filter-group-header" data-key="year_min">
        <span>Année</span><span class="arrow">▾</span>
      </div>
      <div class="filter-group-body">
        <div class="range-inputs">
          <input class="input" type="number" placeholder="De" value="${filters.year_min||''}" 
                 min="2000" max="${new Date().getFullYear()}" onchange="setFilter('year_min',this.value)">
          <input class="input" type="number" placeholder="À" value="${filters.year_max||''}"
                 min="2000" max="${new Date().getFullYear()}" onchange="setFilter('year_max',this.value)">
        </div>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-group-header" data-key="km_max">
        <span>Kilométrage max</span><span class="arrow">▾</span>
      </div>
      <div class="filter-group-body">
        <input class="input" type="number" placeholder="Ex: 100000" value="${filters.km_max||''}"
               onchange="setFilter('km_max',this.value)">
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-group-header" data-key="price_min">
        <span>Prix (€)</span><span class="arrow">▾</span>
      </div>
      <div class="filter-group-body">
        <div class="range-inputs">
          <input class="input" type="number" placeholder="Min" value="${filters.price_min||''}"
                 onchange="setFilter('price_min',this.value)">
          <input class="input" type="number" placeholder="Max" value="${filters.price_max||''}"
                 onchange="setFilter('price_max',this.value)">
        </div>
      </div>
    </div>
    <div class="filter-group" style="border:none">
      <div class="filter-group-body" style="display:block;padding-top:.75rem">
        <label class="filter-option">
          <input type="checkbox" onchange="setFilter('vat',this.checked?'1':'')" ${filters.vat?'checked':''}>
          <span>TVA déductible uniquement</span>
        </label>
      </div>
    </div>
    <div class="sidebar-apply">
      <button class="btn btn-primary btn-full btn-sm" onclick="applyFilters()">Appliquer les filtres</button>
    </div>
  </form>`;
}

function filterGroup(key, label, options, type, filterKey) {
  const opts = options.map(o => `
    <label class="filter-option">
      <input type="${type}" name="${key}" value="${o.v}"
             onchange="setFilter('${filterKey}',this.value)"
             ${filters[filterKey]===o.v?'checked':''}>
      <span>${o.l}</span>
    </label>`).join('');
  return `
  <div class="filter-group">
    <div class="filter-group-header" data-key="${filterKey}">
      <span>${label}</span><span class="arrow">▾</span>
    </div>
    <div class="filter-group-body">
      <div class="filter-options">${opts}</div>
    </div>
  </div>`;
}

function renderActiveFilters() {
  const labels = {
    make:'Marque', model:'Modèle', fuel:'Carburant', gearbox:'Boîte',
    country:'Pays', type:'Type', vat:'TVA', year_min:'Année min',
    year_max:'Année max', km_max:'KM max', price_min:'Prix min', price_max:'Prix max', q:'Recherche'
  };
  const container = document.getElementById('activeFilters');
  container.innerHTML = Object.entries(filters)
    .filter(([,v]) => v)
    .map(([k,v]) => `<span class="active-filter" onclick="removeFilter('${k}')">${labels[k]||k}: ${v} ✕</span>`)
    .join('');
}

function setFilter(key, value) {
  if (value === '' || value === null || value === false) delete filters[key];
  else filters[key] = value;
}
function removeFilter(key) { delete filters[key]; currentPage=1; renderActiveFilters(); renderListings(); renderSidebar(); }
function resetFilters() { filters = {}; currentPage=1; renderActiveFilters(); renderListings(); renderSidebar(); }
function applyFilters() { currentPage=1; renderActiveFilters(); renderListings(); closeFilters(); }
function applySort() { currentPage=1; renderListings(); }
function setView(v) {
  currentView = v;
  document.getElementById('gridViewBtn').classList.toggle('active', v==='grid');
  document.getElementById('listViewBtn').classList.toggle('active', v==='list');
  renderListings();
}
function openFilters() {
  document.getElementById('filterOverlay').classList.add('open');
  document.getElementById('filterDrawer').classList.add('open');
}
function closeFilters() {
  document.getElementById('filterOverlay').classList.remove('open');
  document.getElementById('filterDrawer').classList.remove('open');
}
function toggleFav(btn) {
  const active = btn.style.color === 'var(--red)';
  btn.style.color = active ? '' : 'var(--red)';
  btn.querySelector('svg').setAttribute('fill', active ? 'none' : 'currentColor');
}

    img:`https://picsum.photos/seed/car${i+1}/480/360`, vat:i%3===0
  };
});

document.addEventListener('DOMContentLoaded', init);
