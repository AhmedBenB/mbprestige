<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oubli? ? MBPRESTIGE</title>
<link rel="stylesheet" href="css/app.css">
<style>
.reset-wrap{max-width:520px;margin:0 auto;padding:2.25rem 0 4rem}
.reset-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:1.5rem}
.notice{display:none;margin-top:1rem;background:#dcfce7;color:#166534;border:1px solid #86efac;padding:.75rem;border-radius:var(--radius-sm);font-size:.875rem}
</style>
</head>
<body>
<header class="header"><div class="container"><div class="header-inner"><a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>MBPRESTIGE</a><div class="header-actions"><a href="login.html" class="btn btn-sm" style="color:var(--gray-700)">Retour connexion</a></div></div></div></header>
<main class="container reset-wrap">
  <div class="reset-card">
    <h1 style="font-size:1.4rem;margin-bottom:.5rem">R?initialiser votre mot de passe</h1>
    <p class="text-muted text-sm" style="margin-bottom:1rem">Entrez votre email professionnel. Nous vous enverrons un lien de r?initialisation.</p>
    <form onsubmit="sendReset(event)">
      <label class="text-sm" for="email" style="display:block;margin-bottom:.35rem;font-weight:600">Email</label>
      <input id="email" class="input" type="email" placeholder="vous@societe.fr" required>
      <button class="btn btn-primary" style="margin-top:1rem" type="submit">Envoyer le lien</button>
    </form>
    <div id="notice" class="notice">Lien envoy?. V?rifiez votre bo?te mail.</div>
  </div>
</main>
<script>
function sendReset(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if(!email){return;}
  document.getElementById('notice').style.display='block';
}
</script>
</body>
</html>
