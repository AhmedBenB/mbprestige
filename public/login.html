<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – MBPRESTIGE</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1d4ed8;--blue-dk:#1e40af;--blue-lt:#dbeafe;--green:#16a34a;--red:#dc2626;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;--radius:14px;--radius-sm:9px;--gray-300:#d1d5db;--gray-600:#4b5563;--gray-800:#1f2937}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
.header{background:#fff;border-bottom:1.5px solid var(--gray-200);padding:0 2rem}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-size:1.1rem;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:.5rem}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--gray-200);padding:2.5rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.auth-logo{text-align:center;margin-bottom:1.75rem}
.auth-logo .logo{justify-content:center;font-size:1.25rem}
.auth-title{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:.375rem}
.auth-subtitle{font-size:.875rem;color:var(--gray-500);text-align:center;margin-bottom:2rem}
.form-group{margin-bottom:1.125rem}
.form-label{display:block;font-size:.8rem;font-weight:700;color:var(--gray-700);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem}
.input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.9rem;color:var(--gray-900);background:#fff;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
.input.error{border-color:var(--red)}
.input-icon-wrap{position:relative}
.input-icon-wrap .input{padding-right:2.75rem}
.input-icon{position:absolute;right:.875rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray-400);background:none;border:none;font-size:1rem;padding:0}
.form-error{color:var(--red);font-size:.78rem;margin-top:.35rem;display:flex;align-items:center;gap:.25rem}
.form-hint{color:var(--gray-400);font-size:.78rem;margin-top:.35rem}
.strength-bar{height:3px;border-radius:9999px;background:var(--gray-200);margin-top:.5rem;overflow:hidden}
.strength-fill{height:100%;border-radius:9999px;transition:width .3s,background .3s;width:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.25rem;border-radius:var(--radius-sm);font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:all .15s;width:100%;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dk)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-google{background:#fff;color:var(--gray-900);border:1.5px solid var(--gray-200)}.btn-google:hover{background:var(--gray-50)}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--gray-400);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.checkbox-row{display:flex;align-items:flex-start;gap:.625rem;font-size:.875rem;color:var(--gray-700)}
.checkbox-row input[type="checkbox"]{width:15px;height:15px;accent-color:var(--blue);flex-shrink:0;margin-top:.15rem;cursor:pointer}
.auth-footer{text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--gray-500)}
.auth-footer a{color:var(--blue);font-weight:600}
.alert{padding:.875rem 1rem;border-radius:var(--radius-sm);font-size:.875rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.625rem}
.alert-error{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.alert-success{background:#dcfce7;color:var(--green);border:1px solid #86efac}
.forgot-link{font-size:.8rem;color:var(--blue);display:block;text-align:right;margin-top:.375rem}
.forgot-link:hover{text-decoration:underline}
.trust-row{display:flex;justify-content:center;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:var(--gray-500)}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>
      MBPRESTIGE
    </a>
    <span style="font-size:.875rem;color:var(--gray-500)">Pas encore de compte ? <a href="register.html" style="color:var(--blue);font-weight:600">S'inscrire</a></span>
  </div>
</header>

<main class="main">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo" style="font-size:1.3rem;justify-content:center">
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>
        MBPRESTIGE
      </div>
    </div>
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-subtitle">Accédez à votre espace professionnel</p>

    <div class="alert alert-error" id="alertError" style="display:none">
      <span>⚠️</span><span id="alertErrorMsg"></span>
    </div>
    <div class="alert alert-success" id="alertSuccess" style="display:none">
      <span>✅</span><span id="alertSuccessMsg"></span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email professionnel</label>
        <input type="email" class="input" id="email" name="email" placeholder="vous@societe.fr" autocomplete="email" required>
        <div class="form-error" id="emailError" style="display:none"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="input-icon-wrap">
          <input type="password" class="input" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="input-icon" onclick="togglePwd('password')" title="Afficher/masquer">👁</button>
        </div>
        <a href="forgot-password.html" class="forgot-link">Mot de passe oublié ?</a>
        <div class="form-error" id="passwordError" style="display:none"></div>
      </div>

      <div class="checkbox-row" style="margin-bottom:1.5rem">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Se souvenir de moi pendant 30 jours</label>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span id="submitText">Se connecter</span>
        <span id="submitSpinner" style="display:none">⏳</span>
      </button>
    </form>

    <div class="divider">ou</div>

    <button class="btn btn-google" onclick="showInfo()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>

    <div class="trust-row">
      <div class="trust-item">🔒 Connexion sécurisée</div>
      <div class="trust-item">🛡️ Données chiffrées</div>
      <div class="trust-item">✅ RGPD conforme</div>
    </div>

    <div class="auth-footer">
      Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a>
    </div>
  </div>
</main>

<script>
function handleLogin(e) {
  e.preventDefault();
  clearErrors();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let valid = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('email', 'Veuillez saisir un email valide.');
    valid = false;
  }
  if (!password || password.length < 6) {
    showFieldError('password', 'Veuillez saisir votre mot de passe.');
    valid = false;
  }
  if (!valid) return;

  setLoading(true);
  // Simulation API
  setTimeout(() => {
    setLoading(false);

    let ok = false;
    let hasSavedAccount = false;
    try {
      const raw = localStorage.getItem('mbp_account');
      const saved = raw ? JSON.parse(raw) : null;
      if (saved && saved.email && saved.password) {
        hasSavedAccount = true;
        ok = saved.email.toLowerCase() === email.toLowerCase() && saved.password === password;
      }
    } catch (_) {}

    if (ok) {
      localStorage.setItem('mbp_logged_in', '1');
      localStorage.setItem('mbp_has_account', '1');
      showSuccess('Connexion reussie ! Redirection...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else {
      if (!hasSavedAccount) {
        showError('Aucun compte detecte sur ce navigateur. Creez un compte pour continuer.');
      } else {
        showError('Email ou mot de passe incorrect.');
      }
    }
  }, 900);
}

function showFieldError(field, msg) {
  const input = document.getElementById(field);
  const err = document.getElementById(field + 'Error');
  input.classList.add('error');
  err.textContent = '⚠️ ' + msg;
  err.style.display = 'flex';
}
function clearErrors() {
  ['email','password'].forEach(f => {
    document.getElementById(f).classList.remove('error');
    document.getElementById(f+'Error').style.display = 'none';
  });
  document.getElementById('alertError').style.display = 'none';
  document.getElementById('alertSuccess').style.display = 'none';
}
function showError(msg) {
  document.getElementById('alertErrorMsg').textContent = msg;
  document.getElementById('alertError').style.display = 'flex';
}
function showSuccess(msg) {
  document.getElementById('alertSuccessMsg').textContent = msg;
  document.getElementById('alertSuccess').style.display = 'flex';
}
function setLoading(v) {
  document.getElementById('submitBtn').disabled = v;
  document.getElementById('submitText').style.display = v ? 'none' : '';
  document.getElementById('submitSpinner').style.display = v ? '' : 'none';
}
function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function showInfo() { alert('Fonctionnalité Google disponible après intégration OAuth.'); }
</script>
</body>
</html>
